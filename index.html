<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111111">
    <title>background-torn — old and new</title>
    <link rel="stylesheet" href="./css/index.css">
    <script src="./js/index.js" defer></script>
</head>
<body>
    <header class="version-switcher" aria-label="Choose a background-torn version">
        <span class="version-switcher__title">background-torn</span>
        <div class="version-switcher__controls" role="group" aria-label="Version">
            <button class="version-button is-active" type="button" data-version="old" aria-pressed="true">
                Old version
            </button>
            <button class="version-button" type="button" data-version="new" aria-pressed="false">
                New version
            </button>
        </div>
    </header>

    <main class="preview">
        <iframe
            class="preview__frame"
            title="Old background-torn version"
            src="./versions/old/index.html"
            data-preview
        ></iframe>
    </main>
</body>
</html>
